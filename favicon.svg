<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background -->
  <rect width="32" height="32" rx="7" fill="#0A1D4A"/>
  <!-- chip body -->
  <rect x="8.5" y="8.5" width="15" height="15" rx="2.25" stroke="#609bff" stroke-width="1.75" fill="none"/>
  <!-- inner core -->
  <rect x="12" y="12" width="8" height="8" rx="1.25" fill="#609bff" opacity=".28"/>
  <!-- top pins -->
  <line x1="12.5" y1="8.5" x2="12.5" y2="5"   stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16"   y1="8.5" x2="16"   y2="5"   stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.5" y1="8.5" x2="19.5" y2="5"   stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- bottom pins -->
  <line x1="12.5" y1="23.5" x2="12.5" y2="27" stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16"   y1="23.5" x2="16"   y2="27" stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.5" y1="23.5" x2="19.5" y2="27" stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- left pins -->
  <line x1="8.5" y1="12.5" x2="5" y2="12.5"  stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8.5" y1="16"   x2="5" y2="16"    stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8.5" y1="19.5" x2="5" y2="19.5"  stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- right pins -->
  <line x1="23.5" y1="12.5" x2="27" y2="12.5" stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23.5" y1="16"   x2="27" y2="16"   stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23.5" y1="19.5" x2="27" y2="19.5" stroke="#609bff" stroke-width="1.5" stroke-linecap="round"/>
</svg>
